<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-7634701795357272">
  <meta name="theme-color" content="#f4efe6">
  <title>Scoreboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #f4efe6;
      color: #17130f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 10vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: #5c5147;
      font-size: 18px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 8px;
      background: #17130f;
      color: #f4efe6;
      text-decoration: none;
      font-weight: 700;
    }

    a:focus-visible {
      outline: 3px solid #d84d35;
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Scoreboard</h1>
    <p>一個簡單好用的即時計分板。按下方按鈕開啟目前的計分工具。</p>
    <a href="/scoreboard/">開啟計分板</a>
  </main>
</body>
</html>
